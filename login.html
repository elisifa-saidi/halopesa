<!DOCTYPE html>
<html lang="sw" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="google" content="notranslate">

  <title>Ingia - Halopesa</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:20px;
      width:320px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    input[type="text"]{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    .pin-box{
      display:flex;
      justify-content:space-between;
      margin-top:15px;
    }

    .pin-box input{
      width:45px;
      height:45px;
      text-align:center;
      font-size:18px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      background:#009688;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    /* OTP MESSAGE */
    .otp-message{
      display:none;
      font-size:14px;
      color:#444;
      margin-top:10px;
    }

    .loading{
      display:none;
      margin-top:10px;
      font-size:14px;
      color:#009688;
    }
  </style>
</head>

<body translate="no">

<div class="box">

  <h2>Ingia Halopesa</h2>

  <input type="text" placeholder="Weka namba yako ya Halopesa" id="phone">

  <button onclick="sendOTP()">TUMA MSIMBO WA USALAMA</button>

  <div class="loading" id="loading">
    Inatuma msimbo wa SMS...
  </div>

  <div class="otp-message" id="otpMessage">
    Msimbo umetumwa kwa SMS yako
  </div>

  <p style="margin-top:15px;">Weka PIN yako (OTP)</p>

  <div class="pin-box">
    <input type="password" maxlength="1">
    <input type="password" maxlength="1">
    <input type="password" maxlength="1">
    <input type="password" maxlength="1">
  </div>

  <button>INGIA</button>

</div>

<script>
  // PIN AUTO MOVE
  const inputs = document.querySelectorAll(".pin-box input");

  inputs.forEach((input, index) => {

    input.addEventListener("input", () => {
      if (input.value && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Backspace" && input.value === "" && index > 0) {
        inputs[index - 1].focus();
      }
    });

  });

  // OTP EFFECT
  function sendOTP() {

    document.getElementById("loading").style.display = "block";

    document.getElementById("otpMessage").style.display = "none";

    setTimeout(() => {

      document.getElementById("loading").style.display = "none";

      document.getElementById("otpMessage").style.display = "block";

    }, 2000);

  }
</script>

</body>
</html>
