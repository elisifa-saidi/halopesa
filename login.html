<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halopesa Login</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:20px;
            width:300px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#009688;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Halopesa Login</h2>

    <input type="text" placeholder="Weka namba yako ya Halopesa">

    <input type="password" placeholder="Weka PIN yako ya Halopesa">

    <button>INGIA</button>
</div>

</body>
</html>
