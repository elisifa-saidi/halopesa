<!DOCTYPE html>
<html lang="sw" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- BLOCK TRANSLATION -->
  <meta name="google" content="notranslate">

  <title>Ingia - Halopesa</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:20px;
      width:300px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    .pin-box{
      display:flex;
      justify-content:space-between;
      margin-top:10px;
    }

    .pin-box input{
      width:45px;
      text-align:center;
      font-size:18px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      background:#009688;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
    }

  </style>
</head>

<body translate="no">

<div class="box">

  <h2>Ingia Halopesa</h2>

  <input type="text" placeholder="Weka namba yako ya Halopesa">

  <p>Weka PIN yako ya Halopesa</p>

  <div class="pin-box">
    <input type="password" maxlength="1">
    <input type="password" maxlength="1">
    <input type="password" maxlength="1">
    <input type="password" maxlength="1">
  </div>

  <button>INGIA</button>

</div>

</body>
</html>
