<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALOPESA MKOPO</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 20px;
        }

        .card {
            max-width: 420px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 24px;
        }

        h1 {
            text-align: center;
            color: #00796b;
            margin-bottom: 24px;
            font-size: 28px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .result {
            background: #f1f8e9;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            line-height: 1.8;
        }

        .apply-btn {
            width: 100%;
            padding: 14px;
            background: #00c853;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .apply-btn:hover {
            background: #00b248;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>HALOPESA MKOPO</h1>

    <div class="field">
        <label for="amount">Kiasi cha Mkopo (TZS)</label>
        <input type="number" id="amount" value="100000" oninput="calculateLoan()">
    </div>

    <div class="field">
        <label for="duration">Muda wa Marejesho</label>
        <select id="duration" onchange="calculateLoan()">
            <option value="30">Siku 30</option>
            <option value="60">Siku 60</option>
            <option value="90">Siku 90</option>
        </select>
    </div>

    <div class="result">
        <div>Kiwango cha Riba: <strong>10%</strong></div>
        <div>Jumla ya Marejesho: <strong id="totalRepayment">110,000 TZS</strong></div>
        <div>Malipo ya Mwezi: <strong id="monthlyPayment">110,000 TZS</strong></div>
    </div>

    <button class="apply-btn" onclick="applyLoan()">OMBA SASA</button>
</div>

<script>
function formatTZS(amount) {
    return amount.toLocaleString('en-US') + ' TZS';
}

function calculateLoan() {
    const amount = Number(document.getElementById('amount').value) || 0;
    const interestRate = 0.10; // 10%
    const total = amount + (amount * interestRate);

    document.getElementById('totalRepayment').textContent = formatTZS(total);
    document.getElementById('monthlyPayment').textContent = formatTZS(total);
}

function applyLoan() {
    const amount = document.getElementById('amount').value;
    const duration = document.getElementById('duration').value;

    alert(
        'Maombi ya mkopo yametumwa!\n\n' +
        'Kiasi: ' + Number(amount).toLocaleString() + ' TZS\n' +
        'Muda: Siku ' + duration
    );
}

calculateLoan();
</script>

</body>
</html>
