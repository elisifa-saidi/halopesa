

<div class="card">
    <h1>MKOPO WA HALOPESA</h1>

    <div class="field">
        <label for="amount">Kiasi cha Mkopo (TZS)</label>
        <input
            type="number"
            id="amount"
            value="100000"
            oninput="calculateLoan()"
        >
    </div>

    <div class="field">
        <label for="duration">Muda wa Marejesho</label>
        <select id="duration" onchange="calculateLoan()">
            <option value="30">Siku 30</option>
            <option value="60">Siku 60</option>
            <option value="90">Siku 90</option>
        </select>
    </div>

    <div class="result">
        <div>Kiwango cha Riba: <strong>10%</strong></div>
        <div>Jumla ya Marejesho: <strong id="totalRepayment">110,000 TZS</strong></div>
        <div>Malipo ya Mwezi: <strong id="monthlyPayment">110,000 TZS</strong></div>
    </div>

    <button class="apply-btn" onclick="applyLoan()">
        OMBA SASA
    </button>
</div>
