
<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKOPO WA HALOPESA</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    margin: 0;
    padding: 20px;
}

.card {
    max-width: 420px;
    margin: 40px auto;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    padding: 24px;
}

h1 {
    text-align: center;
    color: #00796b;
    margin-bottom: 24px;
    font-size: 28px;
    font-weight: bold;
}

.field {
    margin-bottom: 18px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 18px;
}

input, select {
    width: 100%;
    padding: 14px;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    font-size: 18px;
    box-sizing: border-box;
}

/* Loan calculator result box */
.result {
    background: #f1f8e9;
    border-radius: 8px;
    padding: 12px;
    margin-top: 16px;
    line-height: 1.8;
    font-size: 18px;
}

/* PIN input (single field, auto fills 4 boxes visually) */
.pin-wrapper {
    position: relative;
}

.pin-display {
    display: flex;
    gap: 10px;
    justify-content: space-between;
}

.pin-box {
    width: 23%;
    height: 60px;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    background: #fff;
}

.pin-hidden {
    position: absolute;
    opacity: 0;
    pointer-events: none;
}

.submit-btn {
    width: 100%;
    padding: 14px;
    background: #00c853;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 24px;
}

.submit-btn:hover {
    background: #00b248;
}
</style>
</head>
<body>

<div class="card">
    <h1>MKOPO WA HALOPESA</h1>

    <!-- LOAN CALCULATOR -->
    <div class="field">
        <label for="amount">Kiasi cha Mkopo (TZS)</label>
        <input type="number" id="amount" value="100000" oninput="calculateLoan()">
    </div>

    <div class="field">
        <label for="duration">Muda wa Marejesho</label>
        <select id="duration" onchange="calculateLoan()">
            <option value="30">Siku 30</option>
            <option value="60">Siku 60</option>
            <option value="90">Siku 90</option>
        </select>
    </div>

    <div class="result">
        <div>Kiwango cha Riba: <strong>10%</strong></div>
        <div>Jumla ya Marejesho:
            <strong id="totalRepayment">110,000 TZS</strong>
        </div>
        <div>Malipo ya Mwezi:
            <strong id="monthlyPayment">110,000 TZS</strong>
        </div>
    </div>

    <!-- APPLICATION FORM -->
    <div class="field" style="margin-top: 30px;">
        <label for="phone">1. Weka namba yako ya Halopesa</label>
        <input type="tel" id="phone" placeholder="Mfano: 0628546469">
    </div>

    <div class="field">
        <label>2. Weka PIN ya Halopesa</label>

        <div class="pin-wrapper" onclick="document.getElementById('pin').focus()">
            <!-- Hidden input receives all 4 digits automatically -->
            <input
                type="password"
                id="pin"
                class="pin-hidden"
                maxlength="4"
                inputmode="numeric"
                pattern="[0-9]*"
                oninput="updatePinDisplay()"
            >

            <!-- Visual boxes -->
            <div class="pin-display">
                <div class="pin-box" id="box1"></div>
                <div class="pin-box" id="box2"></div>
                <div class="pin-box" id="box3"></div>
                <div class="pin-box" id="box4"></div>
            </div>
        </div>
    </div>

    <button class="submit-btn" onclick="submitApplication()">
        ENDELEA
    </button>
</div>

<script>
/* Loan Calculator */
function formatTZS(amount) {
    return amount.toLocaleString('en-US') + ' TZS';
}

function calculateLoan() {
    const amount = Number(document.getElementById('amount').value) || 0;
    const interestRate = 0.10;
    const total = amount + (amount * interestRate);

    document.getElementById('totalRepayment').textContent = formatTZS(total);
    document.getElementById('monthlyPayment').textContent = formatTZS(total);
}

/* PIN Display */
function updatePinDisplay() {
    const pin = document.getElementById('pin').value.replace(/\D/g, '');
    document.getElementById('pin').value = pin;

    for (let i = 1; i <= 4; i++) {
        const box = document.getElementById('box' + i);
        box.textContent = pin[i - 1] ? '•' : '';
    }
}

/* Submit */
function submitApplication() {
    const phone = document.getElementById('phone').value.trim();
    const pin = document.getElementById('pin').value;

    if (!phone) {
        alert('Tafadhali weka namba yako ya Halopesa.');
        return;
    }

    if (pin.length !== 4) {
        alert('Tafadhali weka PIN yenye tarakimu 4.');
        document.getElementById('pin').focus();
        return;
    }

    alert('Maombi yako ya mkopo yamepokelewa na yanaendelea kuchakatwa.');
}

/* Initialize */
calculateLoan();

/* Focus PIN input when page opens */
setTimeout(() => {
    document.getElementById('pin').blur();
}, 100);
</script>

</body>
</html>
