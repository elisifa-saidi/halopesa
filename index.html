<!DOCTYPE html>
<html>
<head>
  <title>Loan Application</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { display: block; margin: 10px 0; padding: 10px; width: 300px; }
    .box { border: 1px solid #ccc; padding: 15px; width: 350px; }
  </style>
</head>
<body>

<div class="box">

  <h2>Loan Calculator</h2>

  <input id="amount" type="number" placeholder="Loan Amount">
  <input id="rate" type="number" placeholder="Interest Rate (%)">
  <input id="months" type="number" placeholder="Months">

  <button onclick="calculateLoan()">Calculate</button>

  <p id="result"></p>

  <hr>

  <h2>Client Form</h2>

  <input id="name" type="text" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="phone" type="text" placeholder="Phone Number">

  <!-- ONLY OMBA SASA BUTTON -->
  <a id="ombaBtn" target="_blank">
    <button style="background: green; color: white;">
      OMBA SASA
    </button>
  </a>

</div>

<script src="app.js"></script>

</body>
</html>
