<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaloPesa Loan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Pata Mkopo Wako Haraka</h1>
  <p>Idhini ya haraka • Riba nafuu • Muda rahisi</p>

  <div class="card">

    <label>Kiasi cha Mkopo</label>
    <h2 id="amountText">TSh 1,580,000</h2>

    <input type="range"
           min="10000"
           max="100000000"
           value="1580000"
           id="loanAmount">

    <label>Muda wa Mkopo</label>
    <h2 id="monthsText">miezi 36</h2>

    <input type="range"
           min="6"
           max="60"
           value="36"
           id="loanMonths">

    <div class="paymentBox">
      <p>Malipo ya Kila Mwezi</p>
      <h1 id="monthlyPayment">TSh 62,821</h1>
    </div>

    <button onclick="sendTelegram()">
      OMBA SASA
    </button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
